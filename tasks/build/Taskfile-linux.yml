version: '3'

vars:
  ARCH64: '{{if eq ARCH "arm"}}arm64{{else}}{{ARCH}}{{end}}'
  GIT_TAG:
    sh: git describe --tags --always --abbrev=0
  INSTANCE_ID:
    sh: node -e 'const {randomUUID}=require("node:crypto");console.log(randomUUID());'

tasks:
  prod:
    desc: Create a production build of the application.
    cmds:
      - wails build -o Zen -platform "linux/{{default .ARCH64 .ARCH}}" -ldflags "-X 'github.com/irbis-sh/zen-desktop/internal/config.Version={{.GIT_TAG}}' -X 'github.com/irbis-sh/zen-desktop/internal/constants.InstanceID={{.INSTANCE_ID}}' -X 'github.com/irbis-sh/zen-desktop/internal/selfupdate.NoSelfUpdate=true'" -m -skipbindings -tags prod,webkit2_41

  prod-noupdate:
    desc: Create a production build of the application with self-updates disabled.
    cmds:
      - wails build -o Zen -platform "linux/{{default .ARCH64 .ARCH}}" -ldflags "-X 'github.com/irbis-sh/zen-desktop/internal/config.Version={{.GIT_TAG}}' -X 'github.com/irbis-sh/zen-desktop/internal/constants.InstanceID={{.INSTANCE_ID}}' -X 'github.com/irbis-sh/zen-desktop/internal/selfupdate.NoSelfUpdate=true'" -m -skipbindings -tags prod,webkit2_41

  deps:
    desc: Install the apt dependencies required to create a production build.
    cmds:
      - sudo apt update && sudo apt install gcc libgtk-3-0 gcc-aarch64-linux-gnu libwebkit2gtk-4.1-dev libxapp-dev
